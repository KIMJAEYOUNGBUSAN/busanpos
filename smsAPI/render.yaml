services:
  - type: web
    name: smsapi-agent
    runtime: node
    plan: starter
    rootDir: smsAPI
    buildCommand: ""
    startCommand: node server.js
    autoDeploy: true
    disk:
      name: smsapi-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3100
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MASTER_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SOLAPI_API_KEY
        sync: false
      - key: SOLAPI_API_SECRET
        sync: false
      - key: SOLAPI_DEFAULT_FROM
        sync: false
      - key: SOLAPI_ENABLED
        value: false
      - key: SOLAPI_TEST_MODE
        value: true
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_DEFAULT_FROM
        sync: false
      - key: RESEND_DEFAULT_FROM_NAME
        sync: false
      - key: RESEND_REPLY_TO
        sync: false
      - key: RESEND_ENABLED
        value: false
      - key: RESEND_TEST_MODE
        value: true
