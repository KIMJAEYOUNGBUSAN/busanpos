services:
  - type: web
    name: smsapi-agent
    env: node
    plan: free
    rootDir: smsAPI
    buildCommand: ""
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3100
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: MASTER_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
